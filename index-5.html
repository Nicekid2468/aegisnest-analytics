<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Aegisnest Analytics — Portfolio Dashboard</title>

  <!-- Google Fonts: Space Grotesk (display/body) + JetBrains Mono (data/ticker utility face) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

  <!-- GSAP via CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Locked 1080x1920 capture canvas. No flex/grid centering on body per spec. -->
  <div id="canvas-wrapper">

    <!-- Background watermark, dead-centered behind all glass panels -->
    <div id="watermark" aria-hidden="true">@mrshafts</div>

    <!-- Ambient glow orbs sit behind panels, above watermark/gradient -->
    <div class="ambient-glow glow-indigo" aria-hidden="true"></div>
    <div class="ambient-glow glow-magenta" aria-hidden="true"></div>

    <!-- Top header -->
    <header id="top-header">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">
          <svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M18 2L33 10V26L18 34L3 26V10L18 2Z" stroke="url(#brandStroke)" stroke-width="1.5" />
            <path d="M18 2V34M3 10L33 26M33 10L3 26" stroke="url(#brandStroke)" stroke-width="0.75" opacity="0.5" />
            <defs>
              <linearGradient id="brandStroke" x1="3" y1="2" x2="33" y2="34" gradientUnits="userSpaceOnUse">
                <stop stop-color="#B79CFF" />
                <stop offset="1" stop-color="#FF7CD4" />
              </linearGradient>
            </defs>
          </svg>
        </span>
        <span class="brand-name">AEGISNEST<span class="brand-name-thin">ANALYTICS</span></span>
      </div>
      <div class="session-meta">
        <span class="session-label">LIVE SESSION</span>
        <span class="session-dot" aria-hidden="true"></span>
      </div>
    </header>

    <!-- Hero: Total Portfolio Value -->
    <section id="hero" aria-label="Total portfolio value">
      <p class="hero-eyebrow">TOTAL PORTFOLIO VALUE</p>
      <h1 id="hero-value" class="hero-value">
        <span class="hero-currency">$</span><span id="hero-value-number">0</span>
      </h1>
      <div class="hero-sub">
        <span id="hero-delta" class="hero-delta">
          <span id="hero-delta-arrow" class="hero-delta-arrow">▲</span>
          <span id="hero-delta-value">0.00%</span>
        </span>
        <span class="hero-sub-divider" aria-hidden="true">·</span>
        <span id="hero-range-label" class="hero-range-label">01 JAN 2007 — 13 JUL 2026</span>
      </div>
    </section>

    <!-- Central chart panel -->
    <section id="chart-panel" class="glass-panel" aria-label="Portfolio performance chart">
      <div class="panel-heading">
        <span class="panel-title">EQUITY CURVE</span>
        <span class="panel-tag" id="chart-trade-count">340 TRADES</span>
      </div>
      <div id="chart-container">
        <svg id="equity-svg" width="100%" height="100%" viewBox="0 0 1000 560" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="lineStroke" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0%" stop-color="#B79CFF" />
              <stop offset="100%" stop-color="#FF7CD4" />
            </linearGradient>
            <linearGradient id="areaFill" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#B79CFF" stop-opacity="0.35" />
              <stop offset="100%" stop-color="#B79CFF" stop-opacity="0" />
            </linearGradient>
            <filter id="lineGlow" x="-50%" y="-50%" width="200%" height="200%">
              <feGaussianBlur stdDeviation="6" result="blur" />
              <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
              </feMerge>
            </filter>
          </defs>
          <!-- Populated by app.js from CSV data -->
          <path id="equity-area-path" d="" fill="url(#areaFill)" stroke="none"></path>
          <path id="equity-line-path" d="" fill="none" stroke="url(#lineStroke)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" filter="url(#lineGlow)"></path>
          <circle id="equity-cursor-dot" cx="0" cy="0" r="7" fill="#FFFFFF"></circle>
        </svg>
      </div>
    </section>

    <!-- Bottom: recent trades list -->
    <section id="trades-panel" class="glass-panel" aria-label="Recent trades">
      <div class="panel-heading">
        <span class="panel-title">RECENT TRADES</span>
        <span class="panel-tag">REALTIME</span>
      </div>
      <div id="trades-list">
        <!-- Trade rows injected by app.js, e.g.:
        <div class="trade-row">
          <span class="trade-symbol">XAU/USD</span>
          <span class="trade-action trade-action--buy">BUY</span>
          <span class="trade-pnl trade-pnl--pos">+$1,204.50</span>
        </div>
        -->
      </div>
    </section>

  </div>

  <script src="app.js"></script>
</body>
</html>
